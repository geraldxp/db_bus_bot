<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Wallet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #ffffff);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      text-align: center;
    }
    .logo { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 32px; line-height: 1.5; }
    .nonce-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 14px 18px;
      font-family: monospace; font-size: 13px;
      word-break: break-all; margin-bottom: 28px;
      max-width: 100%;
    }
    .btn {
      display: block; width: 100%; max-width: 340px;
      padding: 16px; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      border: none; transition: opacity 0.2s;
      margin-bottom: 12px;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary {
      background: var(--tg-theme-button-color, #ab9ff2);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--tg-theme-text-color, #ffffff);
    }
    .status {
      margin-top: 16px; font-size: 14px; min-height: 20px;
      opacity: 0.85; line-height: 1.5;
    }
    .status.error { color: #ff6b6b; }
    .status.success { color: #69db7c; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">👛</div>
  <h1>Connect Wallet</h1>
  <p class="subtitle">Sign the challenge below with your Phantom wallet to prove ownership. Your private key never leaves your device.</p>

  <div class="nonce-box" id="nonceDisplay">Loading challenge…</div>

  <button class="btn btn-primary" id="btnPhantom" onclick="connectPhantom()">
    🔮 Connect with Phantom
  </button>
  <button class="btn btn-secondary" id="btnManual" onclick="showManual()" style="display:none;">
    ✏️ Enter manually instead
  </button>
  <div id="manualSection" style="display:none; width:100%; max-width:340px;">
    <p style="font-size:13px; opacity:0.7; margin-bottom:8px;">
      Open Phantom → Settings → Sign Message → paste the challenge above → send result here:
    </p>
    <textarea id="manualInput" placeholder="pubkey base58_signature"
      style="width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2);
             border-radius:10px; padding:12px; color:inherit; font-size:13px; font-family:monospace;
             min-height:80px; resize:none; margin-bottom:10px;"></textarea>
    <button class="btn btn-primary" onclick="submitManual()">✅ Verify</button>
  </div>

  <p class="status" id="status"></p>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // Read nonce from URL params
    const params = new URLSearchParams(window.location.search);
    const nonce = params.get("nonce") || "";
    document.getElementById("nonceDisplay").textContent = nonce || "No challenge found.";

    // Check for Phantom browser extension
    const phantom = window.phantom?.solana ?? window.solana;
    const hasPhantom = phantom && phantom.isPhantom;

    if (!hasPhantom) {
      document.getElementById("btnPhantom").textContent = "📱 Open Phantom App";
      document.getElementById("btnManual").style.display = "block";
    }

    function setStatus(msg, type = "") {
      const el = document.getElementById("status");
      el.className = "status " + type;
      el.innerHTML = msg;
    }

    // ─── Base64 encode Uint8Array ────────────────────────────────────────────
    function toBase64(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    // ─── Phantom browser extension flow ──────────────────────────────────────
    async function connectPhantom() {
      if (!nonce) { setStatus("❌ No challenge nonce found.", "error"); return; }

      if (!hasPhantom) {
        // Mobile: try Phantom deep link (connect only; signing requires manual fallback)
        const url = "https://phantom.app/ul/v1/connect"
          + "?app_url=" + encodeURIComponent(location.origin)
          + "&redirect_link=" + encodeURIComponent(location.href);
        window.open(url, "_blank");
        setStatus("Opened Phantom. After connecting, use the manual sign option.", "");
        document.getElementById("btnManual").style.display = "block";
        return;
      }

      setStatus('<span class="spinner"></span> Connecting…');
      try {
        await phantom.connect();
        const pubkey = phantom.publicKey.toString();
        setStatus('<span class="spinner"></span> Signing challenge…');

        const msgBytes = new TextEncoder().encode(nonce);
        const { signature } = await phantom.signMessage(msgBytes, "utf8");
        const signatureB64 = toBase64(signature);

        sendResult(pubkey, signatureB64);
      } catch (e) {
        setStatus("❌ " + (e.message || "Connection failed."), "error");
      }
    }

    // ─── Manual fallback ──────────────────────────────────────────────────────
    function showManual() {
      document.getElementById("manualSection").style.display = "block";
      document.getElementById("btnManual").style.display = "none";
    }

    function submitManual() {
      const parts = document.getElementById("manualInput").value.trim().split(/\s+/);
      if (parts.length !== 2) {
        setStatus("❌ Enter: pubkey base58_signature", "error");
        return;
      }
      // Manual flow: signature is already base58 from user — encode it to base64 via binary conversion
      // We send it as-is and the bot will handle base58 decode for us
      // Signal manual mode by prefixing signature_b64 with "b58:"
      sendResult(parts[0], "b58:" + parts[1]);
    }

    // ─── Send result back to bot ──────────────────────────────────────────────
    function sendResult(pubkey, signatureB64) {
      setStatus('<span class="spinner"></span> Verifying…');
      try {
        const payload = JSON.stringify({ pubkey, signature_b64: signatureB64 });
        tg.sendData(payload);
        setStatus("✅ Done! Returning to chat…", "success");
        setTimeout(() => tg.close(), 1000);
      } catch (e) {
        setStatus("❌ Could not send data: " + e.message, "error");
      }
    }
  </script>
</body>
</html>
